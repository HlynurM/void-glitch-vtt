<div class="voidglitch chat-card">
  <header class="card-header flexrow">
    <img src="{{item.img}}" title="{{item.name}}" width="36" height="36"/>
    <h3 class="item-name">{{item.name}}</h3>
  </header>

  <div class="card-content">
    {{{item.system.description}}}
    
    {{#if isWeapon}}
    <div class="weapon-stats">
      <strong>Damage:</strong> {{item.system.damage}} <br/>
      <strong>Range:</strong> {{item.system.range}} <br/>
      {{#if item.system.tags}}
      <strong>Tags:</strong> {{item.system.tags}}
      {{/if}}
    </div>
    {{/if}}
  </div>
</div>
